name: Bug report (English)
description: Report a reproducible problem in Rebecca.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove secrets, passwords, tokens, and private keys from logs and screenshots.
  - type: input
    id: version
    attributes:
      label: Rebecca version
      placeholder: dev commit, release tag, or build date
    validations:
      required: true
  - type: dropdown
    id: install_mode
    attributes:
      label: Install mode
      options: [Binary, Docker, Source]
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options: [Dashboard, Master backend, Node, Xray, Subscription, Database, Installer, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Change ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials and private data from this report.
          required: true
