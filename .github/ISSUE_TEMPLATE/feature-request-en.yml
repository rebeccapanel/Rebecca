name: Feature request (English)
description: Suggest a focused improvement for Rebecca.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior you expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: component
    attributes:
      label: Related component
      options: [Dashboard, Master backend, Node, Xray, Subscription, Database, Installer, Other]
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and requests.
          required: true
