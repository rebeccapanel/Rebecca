name: PR Build

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DASH_DIR: ./dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.DASH_DIR }}/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.7'
          extended: true

      - name: Install dashboard dependencies
        working-directory: ${{ env.DASH_DIR }}
        run: npm ci

      - name: Build dashboard
        run: bash scripts/build_dashboard.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: |
            rebeccapanel/rebecca:pr-${{ github.event.pull_request.number }}
            ghcr.io/rebeccapanel/rebecca:pr-${{ github.event.pull_request.number }}
