name: Build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DASH_DIR: ./dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.DASH_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.DASH_DIR }}
        run: npm ci

      - name: Build project
        working-directory: ${{ env.DASH_DIR }}
        run: VITE_BASE_API=/api/ npm run build -- --outDir=build --assetsDir=statics

      - name: Create 404.html
        working-directory: ${{ env.DASH_DIR }}
        run: cp ./build/index.html ./build/404.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: image_tags
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          tags="ghcr.io/rebeccapanel/rebecca:latest"$'\n'"ghcr.io/rebeccapanel/rebecca:${GITHUB_REF_NAME}"
          dockerhub_enabled=false
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            dockerhub_enabled=true
            tags="${tags}"$'\n'"rebeccapanel/rebecca:latest"$'\n'"rebeccapanel/rebecca:${GITHUB_REF_NAME}"
          fi
          echo "dockerhub_enabled=${dockerhub_enabled}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        id: dockerhub_login
        if: steps.image_tags.outputs.dockerhub_enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Finalize image tags
        id: final_image_tags
        shell: bash
        run: |
          set -euo pipefail
          tags="ghcr.io/rebeccapanel/rebecca:latest"$'\n'"ghcr.io/rebeccapanel/rebecca:${GITHUB_REF_NAME}"
          if [[ "${{ steps.dockerhub_login.outcome }}" == "success" ]]; then
            tags="${tags}"$'\n'"rebeccapanel/rebecca:latest"$'\n'"rebeccapanel/rebecca:${GITHUB_REF_NAME}"
          fi
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.final_image_tags.outputs.tags }}
